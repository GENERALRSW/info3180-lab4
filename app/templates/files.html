{% extends 'base.html' %}

{% block css %}
<style>
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 24px;
  }

  .image-item {
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    aspect-ratio: 1 / 1;
  }

  .image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .image-item img:hover {
    transform: scale(1.05);
  }

  @media (max-width: 768px) {
    .image-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .image-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}

{% block main %}
<div class="mt-4">
  <div class="d-flex justify-content-between align-items-center">
    <h1 class="page-header">Uploaded Images</h1>
    <a href="{{ url_for('upload') }}" class="btn btn-primary btn-sm">Upload New Image</a>
  </div>

  {% include 'flash_messages.html' %}

  {% if images %}
    <div class="image-grid">
      {% for image in images %}
        <div class="image-item">
          <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" />
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="alert alert-info mt-4">
      No images have been uploaded yet. <a href="{{ url_for('upload') }}">Upload one now!</a>
    </div>
  {% endif %}
</div>
{% endblock %}
